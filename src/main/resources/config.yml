configversion: 9
#========================================
#             Custom Structures    
#========================================
#Wiki: https://github.com/ryandw11/CustomStructures/wiki

#Log extra information in console when generating structures
debug: false

#bstats is where data is sent. https://bstats.org/plugin/bukkit/CustomStructures .
#Here is some more information on it like what it collects and how to disable it all together and not just for this plugin.
# https://bstats.org/getting-started
bstats: true

# Save where structures spawn into a yaml file.
# Enabling this option allows developers to use the API to get the location of structures.
logStructures: false

# Structure generation uses the built-in Sponge schematic reader/paster.
# Enable this only if you want /cstruct createschem and compile commands to use WorldEdit selections.
WorldEdit:
  Enabled: false

# Built-in schematic paste limits. Each tick stops when either limit is reached.
SchematicPasting:
  MaxBlocksPerTick: 3000
  MaxMillisPerTick: 4.0

# A global list of worlds that structures are allow to spawn in.
GlobalWorldWhitelist: []
# A global list of worlds that structures are not allowed to spawn in.
GlobalWorldBlacklist: []

Structures:
    - demo
